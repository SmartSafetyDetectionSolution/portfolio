{% extends "base.html" %}

{% block content %}
<section class="section" id="contact">
    <span class="section-label">Contact</span>
    <h2 class="section-title">연락하기</h2>
    <p class="section-subtitle">성장을 위한 새로운 제안과 소중한 인연을 기다립니다</p>

    <div class="contact-grid">
        <div class="contact-info">
            <!-- Email Card -->
            <div class="contact-card">
                <div class="contact-card-icon">📧</div>
                <div class="contact-card-content">
                    <div class="contact-label">Email</div>
                    <div class="contact-value"><a href="mailto:ky971102@naver.com">ky971102@naver.com</a></div>
                </div>
            </div>

            <!-- Phone Card (Improved UI) -->
            <div class="contact-card highlight-card">
                <div class="contact-card-icon">📱</div>
                <div class="contact-card-content">
                    <div class="contact-label">Phone</div>
                    <div class="contact-value" id="phoneDisplay">010-****-****</div>
                    <button class="btn-reveal" id="phoneRevealBtn">🔒 번호 확인하기</button>
                </div>
            </div>

            <!-- GitHub Card -->
            <div class="contact-card">
                <div class="contact-card-icon">💻</div>
                <div class="contact-card-content">
                    <div class="contact-label">GitHub</div>
                    <div class="contact-value"><a href="https://github.com/97lky971102-coder" target="_blank">github.com/97lky971102-coder</a></div>
                </div>
            </div>
        </div>

        <!-- Contact Form -->
        <form class="contact-form" id="contactForm" enctype="multipart/form-data">
            <h3 style="margin-bottom: 25px; font-size: 1.4rem; font-weight: 700;">메시지 보내기</h3>
            <div class="form-row">
                <div class="form-group">
                    <label for="name">성함</label>
                    <input type="text" name="name" id="name" placeholder="홍길동" required>
                </div>
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" name="email" id="email" placeholder="example@email.com" required>
                </div>
            </div>
            <div class="form-group">
                <label for="phone">연락처 (선택)</label>
                <input type="tel" name="phone" id="phone" placeholder="010-0000-0000">
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea name="message" id="message" placeholder="프로젝트 제안이나 궁금하신 점을 자유롭게 남겨주세요." required></textarea>
            </div>
            <div class="form-group">
                <label for="attachment">첨부파일 (이력서/기획서 등)</label>
                <div class="file-input-wrapper">
                    <input type="file" name="attachment" id="attachment" class="file-input">
                    <div class="file-dummy">
                        <span class="file-msg">📎 클릭하거나 파일을 드래그하세요</span>
                    </div>
                </div>
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">🚀 메시지 전송</button>
        </form>
    </div>
</section>

<style>
    .contact-grid {
        display: grid;
        grid-template-columns: 1fr 1.5fr;
        gap: 50px;
        align-items: start;
        padding: 20px; /* 그림자가 잘리지 않도록 충분한 여백 확보 */
    }

    .contact-info {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .contact-card {
        background: var(--bg-card);
        border: 1px solid var(--bg-glass-border);
        padding: 24px;
        border-radius: var(--radius-lg);
        display: flex;
        align-items: center;
        gap: 20px;
        transition: var(--transition-bounce);
        position: relative;
        overflow: hidden;
    }

    .contact-card:hover {
        transform: translateX(10px);
        background: rgba(255, 255, 255, 0.05);
        border-color: var(--accent-primary);
    }

    .highlight-card::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 4px;
        height: 100%;
        background: var(--accent-primary);
    }

    .contact-card-icon {
        width: 56px;
        height: 56px;
        background: rgba(129, 140, 248, 0.1);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.6rem;
        border: 1px solid rgba(129, 140, 248, 0.2);
    }

    .contact-label {
        font-size: 0.75rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        font-weight: 700;
        margin-bottom: 6px;
    }

    .contact-value {
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--text-primary);
    }

    .btn-reveal {
        margin-top: 10px;
        background: var(--accent-primary);
        color: white;
        border: none;
        padding: 6px 14px;
        border-radius: 8px;
        font-size: 0.8rem;
        font-weight: 700;
        cursor: pointer;
        transition: var(--transition-fast);
        display: inline-block;
    }

    .btn-reveal:hover {
        background: #6366f1;
        transform: scale(1.05);
    }

    .btn-reveal.hidden {
        display: none;
    }

    .contact-value.revealed {
        color: var(--accent-primary);
        font-size: 1.25rem;
        letter-spacing: 0.5px;
    }


    .contact-form {
        background: var(--bg-card);
        padding: 40px;
        border-radius: var(--radius-lg);
        border: 1px solid var(--bg-glass-border);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15); /* 더 부드럽고 자연스러운 그림자 */
        transition: var(--transition-smooth);
    }


    .file-input-wrapper {
        position: relative;
        width: 100%;
        height: 100px;
        border: 2px dashed var(--bg-glass-border);
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-glass);
        transition: var(--transition-smooth);
    }

    .file-input-wrapper:hover {
        border-color: var(--accent-primary);
        background: rgba(129, 140, 248, 0.05);
    }

    .file-input {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        z-index: 2;
    }

    .file-msg {
        color: var(--text-muted);
        font-weight: 500;
    }

    @media (max-width: 992px) {
        .contact-grid {
            grid-template-columns: 1fr;
        }
    }
</style>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // 전화번호 확인 버튼 로직
        const revealBtn = document.getElementById('phoneRevealBtn');
        const phoneDisplay = document.getElementById('phoneDisplay');
        const realNumber = "010-5387-4879";

        if (revealBtn && phoneDisplay) {
            revealBtn.addEventListener('click', () => {
                phoneDisplay.textContent = realNumber;
                phoneDisplay.classList.add('revealed');
                revealBtn.classList.add('hidden');
                
                // 번호 확인 시 강조 효과
                phoneDisplay.animate([
                    { transform: 'scale(1)', opacity: 0.5 },
                    { transform: 'scale(1.05)', opacity: 1 },
                    { transform: 'scale(1)', opacity: 1 }
                ], { duration: 400, easing: 'ease-out' });
            });
        }

        // 파일 업로드 파일명 표시
        const fileInput = document.getElementById('attachment');
        const fileMsg = document.querySelector('.file-msg');
        if (fileInput) {
            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    fileMsg.textContent = `✅ 선택됨: ${e.target.files[0].name}`;
                    fileMsg.style.color = 'var(--accent-secondary)';
                }
            });
        }

        // 폼 전송 (기존과 동일하되 디자인 맞춤 알림 추가)
        const contactForm = document.getElementById('contactForm');
        const submitBtn = document.getElementById('submitBtn');

        if (contactForm) {
            contactForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="loader"></span> 전송 중...';

                const formData = new FormData(contactForm);
                try {
                    const response = await fetch('/api/contact', {
                        method: 'POST',
                        body: formData
                    });
                    const result = await response.json();
                    
                    if (result.success) {
                        alert('🚀 메시지가 성공적으로 전달되었습니다! 확인 후 연락드리겠습니다.');
                        contactForm.reset();
                        fileMsg.textContent = '📎 클릭하거나 파일을 드래그하세요';
                        fileMsg.style.color = 'var(--text-muted)';
                    } else {
                        alert('⚠️ 전송에 실패했습니다: ' + result.message);
                    }
                } catch (error) {
                    alert('❌ 네트워크 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = '🚀 메시지 전송';
                }
            });
        }
    });
</script>
{% endblock %}
